rules:
  - id: vibeguard-js-hardcoded-secret
    languages: [javascript, typescript]
    severity: ERROR
    message: >
      Hardcoded secret detected in source code.
    metadata:
      cwe: "CWE-798"
      category: security
      confidence: HIGH
      fix_guidance: >
        Use environment variables: process.env.API_KEY.
        Never hardcode credentials in source files.
      ai_context: >
        AI-generated JavaScript frequently uses realistic-looking placeholder
        secrets that get committed to source control.
      severity_label: "CRITICAL"
      rule_category: "secrets"
    patterns:
      - pattern-either:
          - pattern: const $NAME = "$VALUE"
          - pattern: const $NAME = '$VALUE'
          - pattern: let $NAME = "$VALUE"
          - pattern: let $NAME = '$VALUE'
          - pattern: var $NAME = "$VALUE"
          - pattern: var $NAME = '$VALUE'
      - metavariable-regex:
          metavariable: $NAME
          regex: "(?i)^(apiKey|api_key|apikey|password|passwd|secret|token|authToken|accessToken|privateKey|clientSecret|stripeKey|awsSecret|jwtSecret)$"
      - metavariable-regex:
          metavariable: $VALUE
          regex: "^.+$"
