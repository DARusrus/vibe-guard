rules:
  - id: vibeguard-gha-secret-echo
    languages: [yaml]
    severity: ERROR
    message: >
      Workflow run steps that echo or transmit secrets can leak sensitive
      credentials into logs and downstream systems.
    metadata:
      cwe: "CWE-532"
      category: security
      confidence: HIGH
      fix_guidance: >
        Remove secret echo/debug output and avoid passing secrets to visible
        command lines; use masked environment variables when necessary.
      ai_context: >
        AI-generated workflows often add echo debugging for failing pipelines
        and unintentionally print secrets context references.
      severity_label: "CRITICAL"
      rule_category: "secrets"
    pattern-regex: "(?i)(echo|curl)[^\\n]*\\$\\{\\{\\s*secrets\\."
