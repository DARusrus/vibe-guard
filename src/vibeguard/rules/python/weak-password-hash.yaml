rules:
  - id: vibeguard-python-weak-password-hash
    languages: [python]
    severity: ERROR
    message: >
      Fast hash functions are unsafe for password storage and enable offline
      brute-force attacks at high guess rates.
    metadata:
      cwe: "CWE-916: Use of Password Hash With Insufficient Computational Effort"
      category: security
      confidence: HIGH
      fix_guidance: >
        Use bcrypt or Argon2 for password hashing. Example:
        bcrypt.hashpw(password.encode(), bcrypt.gensalt()).
      ai_context: >
        AI models frequently use hashlib examples from basic tutorials and
        apply them to passwords even though these hashes are intentionally fast.
      severity_label: "CRITICAL"
      rule_category: "password_hash"
    patterns:
      - pattern-either:
          - pattern: hashlib.md5($PWD.encode()).hexdigest()
          - pattern: hashlib.sha1($PWD.encode()).hexdigest()
          - pattern: hashlib.sha256($PWD.encode()).hexdigest()
          - pattern: hashlib.sha512($PWD.encode()).hexdigest()
      - metavariable-regex:
          metavariable: $PWD
          regex: "(?i).*(password|passwd|pwd|secret|credential).*"
