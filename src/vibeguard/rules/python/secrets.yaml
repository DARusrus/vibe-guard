rules:
  - id: vibeguard-python-hardcoded-secret-assignment
    languages: [python]
    severity: ERROR
    message: >
      Hardcoded credential detected. This value is embedded directly
      in source code and will be exposed in version control.
    patterns:
      - pattern-either:
          - pattern: $VAR = "..."
          - pattern: $VAR = '...'
      - metavariable-regex:
          metavariable: $VAR
          regex: >-
            (?i)(password|passwd|pwd|secret|api_key|apikey|token|
            auth_token|access_token|private_key|client_secret|
            credentials|passphrase|db_password|db_pass|
            aws_secret|stripe_key|stripe_secret|
            sendgrid_key|sendgrid_api|jwt_secret|
            encryption_key|signing_key|database_url)
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
      fix_guidance: >
        Move this value to an environment variable.
        Use os.environ.get('VAR_NAME') in your code and document
        required variables in .env.example. Never commit credentials.
      ai_context: >
        AI models frequently embed realistic-looking placeholder
        credentials when generating working examples, which get
        committed to source control without developers noticing.
      severity_label: "CRITICAL"
      rule_category: "secrets"
