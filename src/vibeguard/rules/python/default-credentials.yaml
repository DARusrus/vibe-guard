rules:
  - id: vibeguard-python-default-credentials
    languages: [python]
    severity: ERROR
    message: >
      Seeding users with default literal passwords can ship exploitable
      credentials into production environments.
    metadata:
      cwe: "CWE-1392: Use of Default Credentials"
      category: security
      confidence: HIGH
      fix_guidance: >
        Never hardcode seed passwords. Generate temporary secrets at runtime,
        store them securely, and force reset on first login.
      ai_context: >
        AI-generated bootstrap scripts often include simple fixed passwords for
        demo usability, and those values frequently persist into real systems.
      severity_label: "CRITICAL"
      rule_category: "default_credentials"
    patterns:
      - pattern-either:
          - pattern: $OBJ.create(..., password="admin", ...)
          - pattern: $OBJ.create(..., password="password", ...)
          - pattern: $OBJ.create(..., password="123456", ...)
          - pattern: $OBJ.create(..., password="root", ...)
          - pattern: $OBJ.create(..., password="admin123", ...)
          - pattern: $OBJ.create(..., password="changeme", ...)
          - pattern: $OBJ.insert(..., password="default", ...)
          - pattern: $OBJ.add(..., password="qwerty", ...)
          - pattern: $OBJ.seed(..., password="pass", ...)